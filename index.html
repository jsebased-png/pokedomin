<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokendomin</title>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section>
        <div>
            <label for="pokemons">ELige tu Pokemón</label>
            <select id="pokemons" onchange="pokemonSelected(this.value)">
                <option value="">Select a Pokemon</option>
            </select>
        </div>

        <div id="pokemon-info">
            <h1 id="pokemon-name"></h1>
            <div id="pokemon-image-container">
                <img id="pokemon-image" alt="pokemon">
            </div>
            <ul id="pokemon-stats"></ul>
            <ul id="pokemon-abilities"></ul>
        </div>
    </section>
</body>

</html>
