<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokendomin</title>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-animated"></div>
    <div class="particles" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <main class="app-shell">
        <section class="pokedex-card">
            <header class="pokedex-header">
                <h1>PokéDomin</h1>
                <p>Selecciona tu Pokémon y explora sus estadísticas</p>
            </header>

            <div class="selector-wrap">
                <label for="pokemons">Elige tu Pokémon</label>
                <select id="pokemons" onchange="pokemonSelected(this.value)">
                    <option value="">Selecciona un Pokémon</option>
                </select>
            </div>

            <div id="pokemon-info" class="pokemon-info">
                <h2 id="pokemon-name"></h2>

                <div id="pokemon-image-container" class="pokemon-image-container">
                    <img id="pokemon-image" alt="pokemon">
                </div>

                <div class="panel">
                    <h3>Estadísticas</h3>
                    <ul id="pokemon-stats" class="stats-list"></ul>
                </div>

                <div class="panel">
                    <h3>Habilidades</h3>
                    <ul id="pokemon-abilities" class="abilities-list"></ul>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
